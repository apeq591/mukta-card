<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mukta Dhandge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0A0B0D; --card1:#17191E; --card2:#0F1115;
    --ink:#F4F4F2; --mute:rgba(244,244,242,.52); --line:rgba(244,244,242,.10);
    --accent:#FF6A2C;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Space Grotesk', system-ui, sans-serif; color:var(--ink); background:var(--bg);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 16px; }

  .hint { max-width:400px; text-align:center; color:var(--mute); font-size:13px; margin-bottom:24px; line-height:1.55;
    font-family:'Space Mono', monospace; }

  /* Business-card ratio (85.6 x 53.98 mm) */
  .card { width:540px; height:340px; border-radius:16px; overflow:hidden; display:flex;
    background:linear-gradient(158deg, var(--card1) 0%, var(--card2) 100%);
    border:1px solid var(--line); box-shadow:0 30px 70px -30px rgba(0,0,0,.8); }

  .left { flex:1; padding:32px 30px; display:flex; flex-direction:column; }
  .kick { font-family:'Space Mono', monospace; font-size:11px; letter-spacing:.2em; color:var(--accent); }
  .name { font-weight:700; font-size:40px; line-height:1.0; letter-spacing:-.02em; margin-top:14px; }
  .rule { width:42px; height:3px; background:var(--accent); border-radius:2px; margin:18px 0; }
  .role { font-size:14.5px; line-height:1.5; color:rgba(244,244,242,.72); max-width:250px; margin-top:6px; }
  .work { font-weight:600; font-size:19px; margin-top:9px; letter-spacing:-.01em; }
  .work span { color:var(--accent); margin:0 8px; }
  .work em { font-style:normal; font-weight:400; font-size:13.5px; color:var(--mute); letter-spacing:0; margin-left:4px; }
  .contact { margin-top:auto; font-family:'Space Mono', monospace; font-size:12.5px; line-height:1.7; }
  .contact .em { color:var(--ink); font-family:'Space Grotesk', sans-serif; font-size:14px; letter-spacing:.01em; }
  .contact .loc { color:var(--mute); }

  .right { width:194px; padding:24px; border-left:1px solid var(--line);
    background:rgba(255,255,255,.015);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px; }
  .brand { font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:22px; letter-spacing:-.01em; color:var(--ink); }
  .brand span { color:var(--accent); }
  .qr { width:124px; height:124px; background:#fff; border-radius:10px; padding:8px; border:0; cursor:pointer; }
  .qr img { width:100%; height:100%; display:block; }
  .scan { font-family:'Space Mono', monospace; font-size:10.5px; letter-spacing:.06em; text-align:center; color:var(--mute); }
  .scan b { color:var(--accent); font-weight:700; }
  .tap { font-family:'Space Mono', monospace; font-size:9.5px; color:var(--mute); opacity:.7; }

  .print-btn { margin-top:26px; border:1px solid var(--line); cursor:pointer; border-radius:999px;
    background:var(--accent); color:#0A0B0D; font-weight:700; font-size:14px; padding:12px 26px;
    font-family:'Space Mono', monospace; letter-spacing:.04em; }
  .print-btn:active { transform:translateY(1px); }

  /* Full-screen QR so she can show just the code */
  .qr-full { display:none; position:fixed; inset:0; z-index:50; background:var(--bg); cursor:pointer;
    flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:24px; }
  .qr-big { width:min(78vw,360px); aspect-ratio:1; background:#fff; border-radius:20px; padding:18px; }
  .qr-big img { width:100%; height:100%; display:block; }
  .qr-cap { font-family:'Space Mono', monospace; text-align:center; color:var(--ink); font-size:15px; line-height:1.8; }
  .qr-cap span { color:var(--mute); font-size:12px; }

  @media (max-width:580px){ .card{ transform:scale(.84); } }

  @page { size:86mm 54mm; margin:0; }
  @media print {
    body { background:#fff; padding:0; display:block; }
    .noprint { display:none !important; }
    .card { width:86mm; height:54mm; border-radius:0; box-shadow:none; border:none; }
    .qr { cursor:default; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="left">
      <span class="kick">INVENTOR</span>
      <h1 class="name">Mukta Dhandge</h1>
      <div class="rule"></div>
      <div class="work">ResQify <span>/</span> MediQ <em>&middot; Patents pending</em></div>
      <div class="contact">
        <div class="em">mukta.dhandge@icloud.com</div>
        <div class="loc">Glasgow, UK</div>
      </div>
    </div>
    <div class="right">
      <div class="brand">Ape<span>Q</span></div>
      <button class="qr" onclick="document.getElementById('qrFull').style.display='flex'" aria-label="Enlarge QR code">
        <img src="assets/qr-card.png" alt="QR code to Mukta Dhandge's card" />
      </button>
      <p class="scan"><b>SCAN</b> // my card</p>
      <p class="tap noprint">tap to show big</p>
    </div>
  </div>

  <div id="qrFull" class="qr-full noprint" onclick="this.style.display='none'">
    <div class="qr-big"><img src="assets/qr-card.png" alt="QR code to Mukta Dhandge's card" /></div>
    <p class="qr-cap">Mukta Dhandge<br /><span>tap anywhere to close</span></p>
  </div>
</body>
</html>
